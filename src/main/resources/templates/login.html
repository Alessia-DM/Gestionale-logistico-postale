<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} ?: 'Gestionale Stage Fiven - Login'"></title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <!-- Icone -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- CSS custom -->
    <link rel="stylesheet" th:href="@{/css/loginstyle.css}">
</head>

<body>
<div class="page-container">
	<main class="login-wrapper">
	    <div class="login-box">
	
	        <!-- RIGA SUPERIORE -->
	        <div class="login-up">
	            <img th:src="@{/img/logo_fiven_negative.png}" alt="Logo Fiven" class="login-logo">
	        </div>
	
	        <!-- RIGA INFERIORE (BLOCCO CON GLI INPUT) -->
	        <div class="login-down">
	            <form th:action="@{/login}" method="post">
	            	<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
	
	                <div class="login-header">
	                    <h2>Accesso utenti autorizzati</h2>
	                </div>
	
	                <!-- Messaggi di errore e logout -->
	                <div th:if="${param.expired}" class="alert alert-warning">
	                    Sessione scaduta, effettua di nuovo il login.
	                </div>
	
	                <div th:if="${loginError}" class="alert alert-danger">
	                    <span th:text="${loginError}"></span>
	                </div>

	                <div th:if="${logoutMessage}" class="alert alert-success">
					    <p th:text="${logoutMessage}"></p>
					</div>
	
	                <div class="d-flex gap-2"><!-- gap aggiunge lo spazio tra i due input -->
	                    <input type="text" name="username" class="form-control form-control-lg" placeholder="Nome Utente" required>
	                    <input type="password" name="password" class="form-control form-control-lg" placeholder="Password" required>
	                </div>
	
	                <div class="login-options mb-2 mt-2 d-flex justify-content-between align-items-center">
	                    <div class="form-check">
	                        <input type="checkbox" class="form-check-input" id="rememberMe" name="remember-me">
	                        <label for="rememberMe" class="form-check-label">
	                            Ricordami
	                        </label>
	                    </div>
	                    <a href="#">Password dimenticata?</a>
	                </div>
	
	                <button type="submit" class="btn btn-custom w-100 mt-4">Login</button>
	
	            </form>
	        </div>
	
	    </div>
	</main>
	<div th:replace="~{fragments/footer :: footer}"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
