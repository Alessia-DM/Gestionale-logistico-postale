<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title th:text="'Scheda profilo di ' + ${descrizioneUtente}">Modifica Profilo</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- CSS custom -->
    <link rel="stylesheet" th:href="@{/css/homestyle.css}">
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/BUTTONS.css}">
</head>

<body>

<!-- NAVBAR FRAGMENT -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<!-- CONTENUTO -->
<main class="container mt-5">
<div class="header-profilo">
		<h1 th:text="'Modifica profilo di ' + ${descrizioneUtente}"></h1>
		<button type="button" onclick="confirmExit()" class="btn profilo-btn-back mb-3">
		    <i class="bi bi-arrow-left"></i> Indietro
		</button>
	</div>
    
    <div class="card p-4 shadow-sm">
        <form th:action="@{/profilo/edit}" th:object="${utente}" method="post">

            <div class="mb-3">
                <strong><label class="form-label">Email:</label></strong>
                <input type="email" th:field="*{email}" id="email" class="form-control"/>
            </div>

            <div class="mb-3">
                <strong><label class="form-label">Tel Fisso:</label></strong>
                <input type="text" th:field="*{telFisso}" id="telFisso" class="form-control"/>
            </div>

            <div class="mb-3">
                <strong><label class="form-label">Tel Mobile:</label></strong>
                <input type="text" th:field="*{telMobile}" id="telMobile" class="form-control"/>
            </div>

            <button type="submit" class="btn profilo-salvataggio">
                <i class="bi bi-check-lg"></i> Salva
            </button>
            <a th:href="@{/profilo}" class="btn profilo-annulla">
                <i class="bi bi-x-lg"></i> Annulla
            </a>
        </form>
    </div>
</main>

<!-- FOOTER FRAGMENT -->
<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Per controllare se sono state effettuate modifiche non salvate prima di tornare indietro -->
<script th:src="@{/js/salvataggioModificheProfilo.js}"></script>
		
</body>
</html>
