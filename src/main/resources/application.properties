spring.application.name=esempioFiven
# --- Database ---
spring.datasource.url=jdbc:mysql://localhost:3306/esempioFivenDB
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- MyBatis ---
mybatis.mapper-locations=classpath:mybatis/mapper/*.xml
mybatis.type-aliases-package=com.example.esempioFiven.model

# --- Server ---
server.port=8080

# --- Spring logging ---
logging.level.root=INFO
logging.level.com.exampleFiven=DEBUG


# --- Sezione legata alla sicurezza e i cookies ---
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.timeout=180m


spring.jpa.open-in-view=false